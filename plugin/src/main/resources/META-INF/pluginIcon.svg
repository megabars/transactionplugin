<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- Monitor body (filled) -->
  <rect x="2" y="3" width="36" height="25" rx="3" fill="#1e3a5f" stroke="#4a86c8" stroke-width="1.5"/>
  <!-- Screen area -->
  <rect x="5" y="5.5" width="30" height="19.5" rx="1.5" fill="#132944"/>
  <!-- Stand neck -->
  <rect x="17" y="28" width="6" height="5" rx="0.5" fill="#4a86c8"/>
  <!-- Stand base -->
  <rect x="11" y="33" width="18" height="3.5" rx="2" fill="#4a86c8"/>
  <!-- TX text on screen -->
  <text x="20" y="16.5"
        font-family="Arial, sans-serif"
        font-size="12"
        font-weight="bold"
        fill="#4a86c8"
        text-anchor="middle"
        dominant-baseline="middle">TX</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Monitor frame -->
  <rect x="1" y="1.5" width="14" height="9.5" rx="1.5" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <!-- Stand neck -->
  <line x1="8" y1="11" x2="8" y2="13" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Stand base -->
  <line x1="5" y1="13" x2="11" y2="13" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round"/>
  <!-- TX text -->
  <text x="8" y="7.8"
        font-family="Arial, sans-serif"
        font-size="5.5"
        font-weight="bold"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="middle">TX</text>
</svg>
